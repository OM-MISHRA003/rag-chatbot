name: Keep Streamlit App Awake

on:
  schedule:
  - cron: "0 */4 * * *"
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Playwright
        run: |
          pip install playwright
          playwright install chromium

      - name: Wake Streamlit app if sleeping
        env:
          STREAMLIT_APP_URL: https://rag-chatbot-ix99syqnr8b65ygj3wa9gm.streamlit.app/
        run: python scripts/wake_streamlit.py
